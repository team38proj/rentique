<!-- Add this to the <head> section in your webpage-->
<style>
    .cart-icon {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .cart-icon svg {
        width: 20px;
        height: 20px;
        stroke: #eaeaea;
        transition: all 0.3s ease;
    }

    html.light-mode .cart-icon svg {
        stroke: #333333;
    }

    .cart-icon:hover svg {
        stroke: #00FF00;
    }

    #themeToggle {
        background: transparent;
        border: 1px solid #00FF00;
        color: #ffffff;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1.2rem;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
    }

    html.light-mode #themeToggle {
        color: #333333;
        border-color: #00FF00;
        background: transparent;
    }

    #themeToggle:hover {
        background: transparent;
        border-color: #d2ff4c;
        transform: scale(1.1);
    }
</style>

<!-- Add this before closing </body> -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const toggle = document.getElementById("themeToggle");
        if (!toggle) return;

        const saved = localStorage.getItem("rentique_theme");
        if (saved === "light") {
            document.documentElement.classList.add("light-mode");
            toggle.textContent = "☀️";
        } else {
            toggle.textContent = "🌙";
        }

        toggle.addEventListener("click", function () {
            document.documentElement.classList.toggle("light-mode");
            const isLight = document.documentElement.classList.contains("light-mode");
            localStorage.setItem("rentique_theme", isLight ? "light" : "dark");
            toggle.textContent = isLight ? "☀️" : "🌙";
        });
    });
</script>
